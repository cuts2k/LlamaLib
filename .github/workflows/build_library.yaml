name: Build library

on:
  push:
    tags:
      - 'v*'

env:
  CUDA: 12.4.1

jobs:
  ################################ macOS ################################

  osx-arm64-build:
    runs-on: macos-15

    strategy:
      matrix:
        include:
          - arch: osx-arm64_acc

    steps:
        - continue-on-error: true
          id: setup_libs_macos
          name: Dependencies
          run: |
            echo "Architecture: $(uname -m)"
            echo "Operating System: $(uname -s)"
            brew update

        - id: checkout
          name: Clone
          uses: actions/checkout@v4
          with:
            submodules: recursive

        - id: preparation
          name: Preparation
          run: |
            mkdir -p build/libs
            echo "CMAKE_VARS=-DARCHITECTURE=${{ matrix.arch }} -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs ${{ matrix.cmake_vars }}" >> $GITHUB_ENV
          shell: bash


        - id: cpu-cores
          name: Get number of CPU cores
          uses: SimenB/github-actions-cpu-cores@v2

        - id: cmake_build
          name: Build
          run: |
            cd build
            cmake .. ${{ env.CMAKE_VARS }}
            cmake --build . --config Release -j ${{ steps.cpu-cores.outputs.count }}

        - id: test_build
          name: Test
          run: |
            flag=0
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              flag=1
            else
                CPU_FLAGS=$(grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | tr '\n' ' ')
                ARCH="${{ matrix.arch }}"
                FEATURE="${ARCH##*_}"
                if echo "$CPU_FLAGS" | grep -qw "$FEATURE"; then
                  flag=1
                fi
            fi
        
            if [[ "$flag" == "1" ]]; then
              ./tests/download_test_models.sh
              cd build
              if [[ "$RUNNER_OS" == "Windows" ]]; then
                ./libs/Release/llamalib_tests.exe
                ./libs/Release/llamalib_tests_runtime.exe
              else
                ./libs/llamalib_tests
                ./libs/llamalib_tests_runtime
              fi
            fi
          shell: bash


        - id: pack_artifacts
          name: Pack artifacts
          run: |
            ls -R build
        
            mkdir -p artifacts
            mv build/Release/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/*.so* artifacts/ 2>/dev/null || true
            mv build/libs/Release/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/Release/*.dll artifacts/ 2>/dev/null || true
            rm -f artifacts/*llamalib_tests* artifacts/*exp artifacts/*server*lib 2>/dev/null || true
        
            rm -r build
            cd artifacts
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              7z a ../${{ matrix.arch }}.zip *
            else
              zip ../${{ matrix.arch }}.zip *
            fi
          shell: bash

        - id: upload_llamalib
          name: Upload Artifacts
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.arch }}.zip
            path: ${{ matrix.arch }}.zip


################################ Windows ################################

  windows-build:
    runs-on: windows-2022

    env:
      VULKAN_VERSION: 1.4.328.1
      PLATFORM: windows

    strategy:
      matrix:
        include:
          - arch: win-x64_vulkan
          - arch: win-x64_cublas

    steps:
        - id: checkout
          name: Clone
          uses: actions/checkout@v4
          with:
            submodules: recursive

        - id: preparation
          name: Preparation
          run: |
            mkdir -p build/libs
            echo "CMAKE_VARS=-DARCHITECTURE=${{ matrix.arch }} -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs ${{ matrix.cmake_vars }}" >> $GITHUB_ENV
          shell: bash

        - id: setup_vulcan_windows
          if: contains(matrix.arch, 'vulkan')
          name: Install Vulkan SDK
          run: |
            mkdir -p .\build\libs\Release
            curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
            & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
            Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
            Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"
            curl.exe -o $env:RUNNER_TEMP/VulkanRT-Components.zip -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/VulkanRT-X64-${env:VULKAN_VERSION}-Components.zip"
            7z x "-o${env:RUNNER_TEMP}" $env:RUNNER_TEMP/VulkanRT-Components.zip
            cp ${env:RUNNER_TEMP}/VulkanRT*\x64\vulkan-1.dll .\build\libs\Release

        - id: setup_cuda_windows
          if: contains(matrix.arch, 'blas')
          uses: Jimver/cuda-toolkit@v0.2.15
          with:
            cuda: ${{ env.CUDA }}
            method: network
            sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'


        - id: cpu-cores
          name: Get number of CPU cores
          uses: SimenB/github-actions-cpu-cores@v2

        - id: cmake_build
          name: Build
          run: |
            cd build
            cmake .. ${{ env.CMAKE_VARS }}
            cmake --build . --config Release -j ${{ steps.cpu-cores.outputs.count }}

        - id: test_build
          name: Test
          run: |
            flag=0
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              flag=1
            else
                CPU_FLAGS=$(grep -o 'avx[^ ]*' /proc/cpuinfo | sort -u | tr '\n' ' ')
                ARCH="${{ matrix.arch }}"
                FEATURE="${ARCH##*_}"
                if echo "$CPU_FLAGS" | grep -qw "$FEATURE"; then
                  flag=1
                fi
            fi
        
            if [[ "$flag" == "1" ]]; then
              ./tests/download_test_models.sh
              cd build
              if [[ "$RUNNER_OS" == "Windows" ]]; then
                ./libs/Release/llamalib_tests.exe
                ./libs/Release/llamalib_tests_runtime.exe
              else
                ./libs/llamalib_tests
                ./libs/llamalib_tests_runtime
              fi
            fi
          shell: bash


        - id: copy_cuda_dlls
          if: contains(matrix.arch, 'cublas')
          name: Copy Cuda DLLs
          run: |
            mv "${{ env.CUDA_PATH }}"/bin/cudart64_*.dll build/libs/Release
            mv "${{ env.CUDA_PATH }}"/bin/cublas64_*.dll build/libs/Release
            mv "${{ env.CUDA_PATH }}"/bin/cublasLt64_*.dll build/libs/Release
          shell: bash

        - id: pack_artifacts
          name: Pack artifacts
          run: |
            ls -R build
        
            mkdir -p artifacts
            mv build/Release/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/*.so* artifacts/ 2>/dev/null || true
            mv build/libs/Release/*llamalib* artifacts/ 2>/dev/null || true
            mv build/libs/Release/*.dll artifacts/ 2>/dev/null || true
            rm -f artifacts/*llamalib_tests* artifacts/*exp artifacts/*server*lib 2>/dev/null || true
        
            rm -r build
            cd artifacts
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              7z a ../${{ matrix.arch }}.zip *
            else
              zip ../${{ matrix.arch }}.zip *
            fi
          shell: bash

        - id: upload_llamalib
          name: Upload Artifacts
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.arch }}.zip
            path: ${{ matrix.arch }}.zip


################################ Release ################################

  create_release:
    name: Create Release
    runs-on: macos-15
    needs:
      - osx-arm64-build
      - windows-build
    steps:
        - id: checkout
          name: Clone
          uses: actions/checkout@v4
          with:
            submodules: recursive

        - id: preparation
          name: Preparation
          run: |
            mkdir -p build/libs
            echo "CMAKE_VARS=-DARCHITECTURE=${{ matrix.arch }} -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${{ github.workspace }}/build/libs ${{ matrix.cmake_vars }}" >> $GITHUB_ENV
          shell: bash

        - id: set_release_version
          name: Set version
          run: |
            VERSION=${GITHUB_REF_NAME#v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "RELEASE_NAME=LlamaLib-v$VERSION" >> $GITHUB_ENV
            echo "$VERSION" > VERSION
            sed -i.bak "s|<PackageVersion>.*</PackageVersion>|<PackageVersion>${VERSION}</PackageVersion>|g" csharp/LlamaLib.csproj && rm csharp/LlamaLib.csproj.bak
            sed -i.bak "s|<LlamaLibVersion>.*</LlamaLibVersion>|<LlamaLibVersion>${VERSION}</LlamaLibVersion>|g" csharp/LlamaLib.targets && rm csharp/LlamaLib.targets.bak
            sed -i.bak "s|\(Include=\"LlamaLib\" Version=\)\"[^\"]*\"|\1\"${VERSION}\"|g" tests/csharp/LlamaLib.Test.csproj && rm tests/csharp/LlamaLib.Test.csproj.bak
          shell: bash

        - id: download_artifacts
          name: Download Artifacts
          uses: actions/download-artifact@v4
          with:
            path: release

        - id: create_release
          name: Create release
          run: |
            ./.github/scripts/release.sh release
            mv release ${{ env.RELEASE_NAME }}
            zip -r ${{ env.RELEASE_NAME }}.zip ${{ env.RELEASE_NAME }}
            shasum -a 256 ${{ env.RELEASE_NAME }}.zip | awk '{print $1}' > ${{ env.RELEASE_NAME }}.zip.sha256

        - id: test_cmake
          name: Test cmake
          run: |
            ./tests/download_test_models.sh
            cd tests/cpp-cmake
            cmake . -DLLAMALIB_DIR=../../${{ env.RELEASE_NAME }}
            cmake --build . --config Release
            ./test

        - id: pack_nuget
          name: Pack nuget
          run: |
            cd csharp
            dotnet pack -c Release

        - id: clean_up_release
          name: Clean up
          run: |
            rm -r ${{ env.RELEASE_NAME }}

        - id: test_nuget
          name: Test nuget
          run: |
            ./tests/download_test_models.sh
            mkdir -p ~/.nuget/packages/LlamaLib
            ln -s `pwd`/${{ env.RELEASE_NAME }}.zip ~/.nuget/packages/LlamaLib/${{ env.RELEASE_NAME }}.zip
            cd tests/csharp
            dotnet build -c Release
            dotnet test -c Release --logger "console;verbosity=detailed"

        - id: release
          name: Release
          uses: softprops/action-gh-release@v2
          with:
            files: |
              ${{ env.RELEASE_NAME }}.zip
              ${{ env.RELEASE_NAME }}.zip.sha256
              csharp/bin/Release/LlamaLib*nupkg
            name: Release ${{ env.VERSION }}

